    bib-marc-new:
      summary: Bibliographic MARC record
      value: |
        00266nam a2200097 a 4500008004100000010001700041040002200058100002700080245001600107500004500123\u001E120827s2012    nyua          000 0 eng d\u001E  \u001Fa   63011276 \u001E  \u001FaOCWMS\u001Fbeng\u001FcOCWMS\u001E0 \u001FaOCLC Developer Network\u001E10\u001FaTest Record\u001E  \u001FaFOR OCLC DEVELOPER NETWORK DOCUMENTATION\u001E\u001D    
    validate-multiple-errors:
      summary: Multiple Errors
      value:
        status:
          summary: INVALID
          description: The provided Bib is invalid
          validationErrors:
            errorCount: 4
            errors: '-"The record has been updated by another user." -"Not authorized to delete $d in 040." -"Not authorized to change Record Status (Leader/05) to n." -"Invalid relationship - when 245 is present, then $a in 245 or $k in 245 must be present."'
            recordLevelErrors:
              - message: The record has been updated by another user.
                errorLevel: MINOR
                tag: REC
                occurrence: 1
              - message: Not authorized to delete $d in 040.
                errorLevel: CRITICAL
                tag: REC
                occurrence: 1
            fixedFieldErrors:
              - tag: '000'
                errorLevel: MINOR
                message: Not authorized to change Record Status (Leader/05) to n.
            variableFieldErrors:
              - tag: '245'
                errorLevel: CRITICAL
                message: Invalid relationship - when 245 is present, then $a in 245 or $k in 245 must be present.
