openapi: 3.0.2
info:
  description: WorldCat Metadata API
  version: 2.0.0
  title: WorldCat Metadata API
servers:
  - url: https://metadata.api.oclc.org
    description: PROD
security:
  - worldcat_metadata_auth:
      - WorldCatMetadataAPI
externalDocs:
  description: Find out more about WorldCatMetadata API
  url: https://www.oclc.org/developer/develop/web-services/worldcat-metadata-api.en.html
paths:
  /worldcat/manage/bibs/validate/{validationLevel}:
    post:
      tags:
        - Manage Bibliographic Records
      summary: Validate a Bibliographic Record
      description: Given a Bibliographic record, apply the validation rules that conform to MARC standards.
      operationId: validate-a-bib
      parameters:
        - name: validationLevel
          in: path
          description: Level at which to validate records
          required: true
          schema:
            type: string
            default: validateFull
            enum:
              - validateFull
              - validateAdd
              - validateReplace
      requestBody:
        description: The Bibliographic record to apply validation on.
        required: true
        content:
          application/marcxml+xml:
            schema:
              $ref: '#/components/schemas/MARCXML'
            examples:
              MARCXML:
                $ref: '#/components/examples/bib-marcxml-new'
          application/marc:
            schema:
              type: string
            examples:
              MARC21:
                $ref: '#/components/examples/bib-marc-new'
      responses:
        '200':
          description: Validation was successfully applied to the Bibliographic record.
          content:
            application/json:
              examples:
                success:
                  summary: Valid Bibliographic Record
                  value:
                    status:
                      summary: VALID
                      description: The provided Bib is valid
        '400':
          description: Bad request. The request is unacceptable.
          content:
            application/json:
              examples:
                missing-control-number:
                  summary: Control Number is Missing
                  value:
                    status:
                      summary: BIB_LACKS_CONTROL_NUMBER
                      description: Record is missing a control number
                multiple-errors:
                  $ref: '#/components/examples/validate-multiple-errors'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '406':
          $ref: '#/components/responses/406-accept-header-unacceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_bibs
  /worldcat/manage/bibs/current:
    get:
      tags:
        - Manage Bibliographic Records
      summary: Retrieve the current OCLC Numbers from WorldCat.
      description: Given one or more OCLC Numbers, check WorldCat for those numbers. It will return the most current OCLC Number(s) associated w/ the OCLC Number(s) provided. If an OCLC Number does not exist or is invalid, a result of null is returned for the requested number.
      operationId: get-current-oclc-number
      parameters:
        - $ref: '#/components/parameters/oclcNumberListReq'
      responses:
        '200':
          description: The current OCLC Numbers were retrieved successfully.
          content:
            application/json:
              examples:
                success:
                  value:
                    controlNumbers:
                      - requested: '1'
                        current: '1'
                      - requested: '261176486'
                        current: '311684437'
                      - requested: '999999999999'
                        current: null
        '400':
          description: Bad request. The request was unacceptable.
          content:
            application/json:
              examples:
                bad-control-number-provided:
                  summary: Bad Control Number
                  value:
                    type: BAD_REQUEST
                    title: Unable to perform retrieve the current OCLC Numbers from WorldCat.
                    detail: No current found control number
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '406':
          $ref: '#/components/responses/406-accept-header-unacceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_bibs
            - WorldCatMetadataAPI:match_bibs
  /worldcat/manage/bibs:
    post:
      tags:
        - Manage Bibliographic Records
      summary: Create a Bibliographic Record
      description: Given a bibliographic record, create it in WorldCat... if it does not exist.
      operationId: bib-create
      requestBody:
        description: The Bibliographic record that will be created.
        required: true
        content:
          application/marcxml+xml:
            schema:
              $ref: '#/components/schemas/MARCXML'
            examples:
              MARCXML:
                $ref: '#/components/examples/bib-marcxml-new'
          application/marc:
            schema:
              type: string
            examples:
              MARC21:
                $ref: '#/components/examples/bib-marc-new'
      responses:
        '200':
          description: The Bibliographic record is created successfully and returns with an OCLC Number.
          content:
            application/marcxml+xml:
              schema:
                $ref: '#/components/schemas/MARCXML'
              examples:
                success:
                  $ref: '#/components/examples/bib-marcxml-existing'
            application/marc:
              examples:
                success:
                  $ref: '#/components/examples/bib-marc-existing'
        '400':
          description: Bad request. The request was unacceptable.
          content:
            application/json:
              examples:
                xml-has-parsing-errors:
                  summary: Bib Has Parsing Errors
                  value:
                    type: BAD_REQUEST
                    title: Unable to crosswalk the record.
                    detail: The record has parsing errors.
                xml-has-missing-or-unusable-data:
                  summary: Bib Has Missing or Unusable Data
                  value:
                    type: BAD_REQUEST
                    title: Unable to perform bib create.
                    detail: Fixed field does not have usable data
                xml-has-validation-errors:
                  summary: Bib has Bad Data
                  value:
                    errorCount: 1
                    errors: '-"Invalid symbol OCWMS in 1st $c in 040."'
                    variableFieldErrors:
                      '-tag': '040'
                      errorLevel: CRITICAL
                      message: Invalid symbol OCWMS in 1st $c in 040.
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '406':
          $ref: '#/components/responses/406-accept-header-unacceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_bibs
  /worldcat/manage/bibs/{oclcNumber}:
    get:
      tags:
        - Manage Bibliographic Records
      summary: Retrieve a Bibliographic record
      description: Given an OCLC Number, retrieve a Bibliographic record, if it exists in WorldCat.
      operationId: bib-read
      parameters:
        - $ref: '#/components/parameters/oclcNumberAsId'
      responses:
        '200':
          description: The Bibliographic record was retrieved successfully.
          content:
            application/marcxml+xml:
              schema:
                $ref: '#/components/schemas/MARCXML'
              examples:
                MARCXML:
                  $ref: '#/components/examples/bib-marcxml-existing'
            application/marc:
              examples:
                MARC21:
                  $ref: '#/components/examples/bib-marc-existing'
        '400':
          description: Bad request. The request was unacceptable.
          content:
            application/json:
              examples:
                non-numeric-oclc-number:
                  $ref: '#/components/examples/non-numeric-oclc-number'
                bib-not-found:
                  $ref: '#/components/examples/bib-not-found'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '404':
          $ref: '#/components/responses/failed-not-found'
        '406':
          $ref: '#/components/responses/406-accept-header-unacceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_bibs
            - WorldCatMetadataAPI:view_marc_bib
    put:
      tags:
        - Manage Bibliographic Records
      summary: Replace a Bibliographic record
      description: Given an OCLC Number, replace a Bibliographic record.  If the Bibliographic record does not exist, then a new Bibliographic record will be created.
      parameters:
        - name: oclcNumber
          in: path
          description: The OCLC number associated with the Bibliographic record to be replaced.
          schema:
            type: integer
            format: int32
          required: true
      operationId: bib-replace
      requestBody:
        description: The Bibliographic record that will be replaced.
        required: true
        content:
          application/marcxml+xml:
            schema:
              $ref: '#/components/schemas/MARCXML'
            examples:
              MARCXML:
                $ref: '#/components/examples/bib-marcxml-existing'
          application/marc:
            schema:
              type: string
            examples:
              MARC21:
                $ref: '#/components/examples/bib-marc-existing'
      responses:
        '200':
          description: The Bibliographic record was replaced successfully.
          content:
            application/marcxml+xml:
              schema:
                $ref: '#/components/schemas/MARCXML'
              examples:
                success:
                  $ref: '#/components/examples/bib-marcxml-existing'
            application/marc:
              examples:
                success:
                  $ref: '#/components/examples/bib-marc-existing'
        '400':
          description: Bad request. The request was unacceptable.
          content:
            application/json:
              examples:
                xml-has-parsing-errors:
                  $ref: '#/components/examples/xml-has-parsing-errors'
                xml-has-missing-or-unusable-data:
                  $ref: '#/components/examples/xml-has-missing-or-unusable-data'
                xml-hdas-validation-errors:
                  $ref: '#/components/examples/xml-has-validation-errors'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '404':
          $ref: '#/components/responses/failed-not-found'
        '406':
          $ref: '#/components/responses/406-accept-header-unacceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_bibs
  /worldcat/manage/bibs/match:
    post:
      tags:
        - Manage Bibliographic Records
      summary: Match a Bibliographic Record
      description: Given a Bibliographic record in textual MARC or MARCXML format, apply OCLC matching rules to provide a single best-matched WorldCat result if possible. Bibliographic input record must contain a minimum of a MARC 008 and a MARC 245 field. In the JSON response, numberOfRecords indicates the potentially matched number of records and briefRecords contains the single best-match as determined by the OCLC matching service.
      operationId: match-bib
      requestBody:
        description: The Bibliographic record to match
        required: true
        content:
          application/marcxml+xml:
            schema:
              $ref: '#/components/schemas/MARCXML'
            examples:
              MARCXML:
                $ref: '#/components/examples/bib-marcxml-existing'
          application/marc:
            schema:
              type: string
            examples:
              MARC21:
                $ref: '#/components/examples/bib-marc-existing'
      responses:
        '200':
          description: Matching rules were applied to the Bibliographic record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BibMatchResult'
              examples:
                bib-match-matched:
                  $ref: '#/components/examples/bib-match-matched'
                bib-match-unmatched:
                  $ref: '#/components/examples/bib-match-unmatched'
        '400':
          description: Bad request. The request is unacceptable.
          content:
            application/json:
              examples:
                missing-control-number:
                  summary: Control Number is Missing
                  value:
                    status:
                      summary: BIB_LACKS_CONTROL_NUMBER
                      description: Record is missing a control number
                multiple-errors:
                  $ref: '#/components/examples/validate-multiple-errors'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '406':
          $ref: '#/components/responses/406-accept-header-unacceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_bibs
            - WorldCatMetadataAPI:match_bibs
  /worldcat/manage/institution/holdings/current:
    get:
      tags:
        - Manage Institution
      summary: Retrieve the current institution holdings for Bibliographic records from WorldCat.
      description: Given one or more OCLC Numbers (up to 10), check WorldCat for the institution holdings. It will return current institution holdings information associated w/ the OCLC Number(s) provided. If an OCLC Number does not exist or is invalid, a result of null is returned for the current control number.
      operationId: get-current-holdings
      parameters:
        - $ref: '#/components/parameters/oclcNumberListReq'
      responses:
        '200':
          description: The current holdings were retrieved successfully.
          content:
            application/json:
              examples:
                success:
                  value:
                    holdings:
                      - requestedControlNumber: '1'
                        currentControlNumber: '1'
                        institutionSymbol: OCWMS
                        holdingSet: true
                      - requestedControlNumber: '261176486'
                        currentControlNumber: '311684437'
                        institutionSymbol: OCWMS
                        holdingSet: true
                      - requestedControlNumber: '999999999999'
                        currentControlNumber: null
                        institutionSymbol: OCWMS
                        holdingSet: false
        '400':
          description: Bad request. The request was unacceptable.
          content:
            application/json:
              examples:
                non-numeric-control-number-provided:
                  summary: Non-Numeric Control Number
                  value:
                    type: BAD_REQUEST
                    title: 'Invalid value provided for query param: oclcNumbers.'
                    detail: 'A request with an invalid query param value was attempted: oclcNumbers=[abc]'
                too-many-control-numbers-provided:
                  summary: Too Many Control Numbers
                  value:
                    type: BAD_REQUEST
                    title: 'Too many values provided for query parameter: oclcNumbers'
                    detail: A maximum of 10 values can be provided for a given request
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '406':
          $ref: '#/components/responses/406-accept-header-unacceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_institution_holdings
  /worldcat/manage/institution/holdings/set:
    post:
      tags:
        - Manage Institution
      summary: Set a holding on a Bibliographic record.
      description: 'Given a Bibliographic record, unset a holding on the record. Note: ONLY one record is allowed in the request body.'
      operationId: set-a-holding
      responses:
        '200':
          description: The holding was set successfully.
          content:
            application/json:
              examples:
                holding-set:
                  $ref: '#/components/examples/holding-set'
                holding-already-set:
                  $ref: '#/components/examples/holding-already-set'
        '400':
          description: Bad request. The request was unacceptable.
          content:
            application/json:
              examples:
                xml-missing-control-number:
                  $ref: '#/components/examples/xml-missing-control-number-set'
                xml-has-parsing-errors:
                  $ref: '#/components/examples/xml-has-parsing-errors'
                xml-has-missing-or-unusable-data:
                  $ref: '#/components/examples/xml-has-missing-or-unusable-data'
                xml-hdas-validation-errors:
                  $ref: '#/components/examples/xml-has-validation-errors'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '404':
          $ref: '#/components/responses/failed-not-found'
        '406':
          $ref: '#/components/responses/406-accept-header-unacceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      requestBody:
        description: The Bibliographic record to set the holding on.
        required: true
        content:
          application/marcxml+xml:
            schema:
              $ref: '#/components/schemas/MARCXML'
            examples:
              MARCXML:
                $ref: '#/components/examples/bib-marcxml-existing'
          application/marc:
            schema:
              type: string
            examples:
              MARC21:
                $ref: '#/components/examples/bib-marc-existing'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_institution_holdings
  /worldcat/manage/institution/holdings/unset:
    post:
      tags:
        - Manage Institution
      summary: Unset a holding on a Bibliographic record.
      description: 'Given a Bibliographic record, unset a holding on the record. Note: ONLY one record is allowed in the request body.'
      operationId: unset-a-holding
      parameters:
        - name: cascadeDelete
          in: query
          description: Remove associated Local Bibliographic Data and/or Local Holdings Records when unsetting the holding
          required: false
          schema:
            type: boolean
            default: true
            enum:
              - true
              - false
      responses:
        '200':
          description: The holding was unset successfully.
          content:
            application/json:
              examples:
                holding-unset:
                  $ref: '#/components/examples/holding-unset'
                holding-already-unset:
                  $ref: '#/components/examples/holding-already-unset'
                holding-unset-blocked-by-lbds:
                  $ref: '#/components/examples/holding-unset-blocked-by-lbds'
                holding-unset-blocked-by-lhrs:
                  $ref: '#/components/examples/holding-unset-blocked-by-lhrs'
                holding-unset-blocked-by-lbds-and-lhrs:
                  $ref: '#/components/examples/holding-unset-blocked-by-lbds-and-lhrs'
        '400':
          description: Bad request. The request was unacceptable.
          content:
            application/json:
              examples:
                non-boolean-cascade-delete:
                  $ref: '#/components/examples/non-boolean-cascade-delete'
                xml-missing-control-number:
                  $ref: '#/components/examples/xml-missing-control-number-unset'
                xml-has-parsing-errors:
                  $ref: '#/components/examples/xml-has-parsing-errors'
                xml-has-missing-or-unusable-data:
                  $ref: '#/components/examples/xml-has-missing-or-unusable-data'
                xml-hdas-validation-errors:
                  $ref: '#/components/examples/xml-has-validation-errors'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '404':
          $ref: '#/components/responses/failed-not-found'
        '406':
          $ref: '#/components/responses/406-accept-header-unacceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      requestBody:
        description: The Bibliographic record to unset the holding on.
        required: true
        content:
          application/marcxml+xml:
            schema:
              $ref: '#/components/schemas/MARCXML'
            examples:
              MARCXML:
                $ref: '#/components/examples/bib-marcxml-existing'
          application/marc:
            schema:
              type: string
            examples:
              MARC21:
                $ref: '#/components/examples/bib-marc-existing'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_institution_holdings
  /worldcat/manage/institution/holdings/{oclcNumber}/set:
    post:
      tags:
        - Manage Institution
      summary: Set the holding on a Bibliographic record for an institution by OCLC Number.
      description: Given an Identifier (OCLC Number), set the holding on the appropriate Bibliographic record.
      operationId: set-holding-for-one-or-multiple-institutions
      parameters:
        - name: oclcNumber
          description: The Identifier is the OCLC Number.
          in: path
          required: true
          schema:
            oneOf:
              - $ref: '#/components/schemas/schemas-OclcNumber'
          examples:
            oclcNumber:
              value: 1234567890
      responses:
        '200':
          description: The holding was set successfully.
          content:
            application/json:
              examples:
                holding-set:
                  $ref: '#/components/examples/holding-set'
                holding-already-set:
                  $ref: '#/components/examples/holding-already-set'
        '400':
          description: Bad request. The request was unacceptable.
          content:
            application/json:
              examples:
                non-numeric-oclc-number:
                  $ref: '#/components/examples/non-numeric-oclc-number'
                bib-not-found:
                  $ref: '#/components/examples/bib-not-found'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '404':
          $ref: '#/components/responses/failed-not-found'
        '406':
          $ref: '#/components/responses/failed-not-acceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_institution_holdings
  /worldcat/manage/institution/holdings/{oclcNumber}/unset:
    post:
      tags:
        - Manage Institution
      summary: Unset the holding on a Bibliographic record for an institution by OCLC Number.
      description: Given an Identifier (OCLC Number), unset the holding on the appropriate Bibliographic record.
      operationId: Unset-holding-for-one-or-multiple-institutions
      parameters:
        - name: oclcNumber
          description: The Identifier is the OCLC Number.
          in: path
          required: true
          schema:
            oneOf:
              - $ref: '#/components/schemas/schemas-OclcNumber'
          examples:
            oclcNumber:
              value: 1234567890
        - name: cascadeDelete
          in: query
          description: Remove associated Local Bibliographic Data and/or Local Holdings Records when unsetting the holding
          required: false
          schema:
            type: boolean
            default: true
            enum:
              - true
              - false
      responses:
        '200':
          description: The holding was unset successfully.
          content:
            application/json:
              examples:
                holding-unset:
                  $ref: '#/components/examples/holding-unset'
                holding-already-unset:
                  $ref: '#/components/examples/holding-already-unset'
                holding-unset-blocked-by-lbds:
                  $ref: '#/components/examples/holding-unset-blocked-by-lbds'
                holding-unset-blocked-by-lhrs:
                  $ref: '#/components/examples/holding-unset-blocked-by-lhrs'
                holding-unset-blocked-by-lbds-and-lhrs:
                  $ref: '#/components/examples/holding-unset-blocked-by-lbds-and-lhrs'
        '400':
          description: Bad request. The request was unacceptable.
          content:
            application/json:
              examples:
                non-boolean-cascade-delete:
                  $ref: '#/components/examples/non-boolean-cascade-delete'
                non-numeric-oclc-number:
                  $ref: '#/components/examples/non-numeric-oclc-number'
                bib-not-found:
                  $ref: '#/components/examples/bib-not-found'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/403-forbidden-url'
        '404':
          $ref: '#/components/responses/failed-not-found'
        '406':
          $ref: '#/components/responses/406-accept-header-unacceptable'
        '500':
          $ref: '#/components/responses/500-internal-server-error'
      security:
        - worldcat_metadata_auth:
            - WorldCatMetadataAPI:manage_institution_holdings
  /worldcat/manage/institution/holdings/move:
    post:
      tags:
        - Manage Institution
      summary: Move a holding from one Bibliographic record to another.
      description: Given source and target OCLC numbers, move the holdings from the source to the target.
      operationId: move-holdings
      requestBody:
        description: The source and target OCLC numbers
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveHoldings'
            examples:
              success-single-holding:
                value:
                  sourceOclcNumber: '1'
                  targetOclcNumber: null
      responses:
        '200':
          description: The Holding Codes were retrieved successfully.
          content:
            application/json:
              examples:
                success-lbds:
                  value:
                    - sourceControlNumber: '1'
                    - requestedSourceControlNumber: '1'
                    - targetControlNumber: '2'
                    - requestedTargetControlNumber: '2'
                    - success: true
                    - message: Successfully set holding and moved local bibliographic data (LBD) to bibliographic record {target OCN}.
                    - action: Move Holdings
                success-lhrs:
                  value:
                    - sourceControlNumber: '1'
                    - requestedSourceControlNumber: '1'
                    - targetControlNumber: '2'
                    - requestedTargetControlNumber: '2'
                    - success: true
                    - message: Successfully set holding and moved local holdings record (LHR) to bibliographic record {target OCN}.
                    - action: Move Holdings
                success-lbds-and-lhrs:
                  value:
                    - sourceControlNumber: '1'
                    - requestedSourceControlNumber: '1'
                    - targetControlNumber: '2'
                    - requestedTargetControlNumber: '2'
                    - success: true
                    - message: Successfully set holding and moved local bibliographic data (LBD) and local holdings records (LHRs) to bibliographic record {target OCN}.
                    - action: Move Holdings
                success-lhrs-and-some-lbds:
                  value:
                    - sourceControlNumber: '1'
                    - requestedSourceControlNumber: '1'
                    - targetControlNumber: '2'
                    - requestedTargetControlNumber: '2'
                    - success: true
