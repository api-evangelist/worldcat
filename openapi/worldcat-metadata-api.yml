components:
  securitySchemes:
    worldcat_metadata_auth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://oauth.oclc.org/token
          scopes:
            WorldCatMetadataAPI:view_brief_bib: view brief bibliographic data
            WorldCatMetadataAPI:view_bib: view full bibliographic data
            WorldCatMetadataAPI:view_marc_bib: view marc bibliographic data
            WorldCatMetadataAPI:match_bibs: match bibliographic records
            WorldCatMetadataAPI:get_holding_codes: retrieve holding codes
            WorldCatMetadataAPI:manage_bibs: manage bibliographic data
            WorldCatMetadataAPI:view_retained_holdings: view holdings which libraries have chosen to retain
            WorldCatMetadataAPI:view_summary_holdings: view summary information about library holdings
            WorldCatMetadataAPI:view_my_holdings: view detailed information about the authentication institution's holdings
            WorldCatMetadataAPI:view_my_holdings_private_notes: view private notes in holdings data
            WorldCatMetadataAPI:manage_institution_holdings: manage institution holdings
            WorldCatMetadataAPI:view_my_local_bib_data: view local bibliographic data from the authenticate institution
            WorldCatMetadataAPI:manage_institution_lbds: manage institution local bibliographic data records
            WorldCatMetadataAPI:manage_institution_lhrs: manage institution local holdings data records
            enhMetadataAPI:fieldTransfer: field transfer functionality
        authorizationCode:
          authorizationUrl: https://oauth.oclc.org/auth
          tokenUrl: https://oauth.oclc.org/token
          scopes:
            WorldCatMetadataAPI:view_brief_bib: view brief bibliographic data
            WorldCatMetadataAPI:view_bib: view full bibliographic data
            WorldCatMetadataAPI:view_marc_bib: view marc bibliographic data
            WorldCatMetadataAPI:match_bibs: match bibliographic records
            WorldCatMetadataAPI:get_holding_codes: retrieve holding codes
            WorldCatMetadataAPI:manage_bibs: manage bibliographic data
            WorldCatMetadataAPI:view_retained_holdings: view holdings which libraries have chosen to retain
            WorldCatMetadataAPI:view_summary_holdings: view summary information about library holdings
            WorldCatMetadataAPI:view_my_holdings: view detailed information about the authentication institution's holdings
            WorldCatMetadataAPI:view_my_holdings_private_notes: view private notes in holdings data
            WorldCatMetadataAPI:manage_institution_holdings: manage institution holdings
            WorldCatMetadataAPI:view_my_local_bib_data: view local bibliographic data from the authenticate institution
            WorldCatMetadataAPI:manage_institution_lbds: manage institution local bibliographic data records
            WorldCatMetadataAPI:manage_institution_lhrs: manage institution local holdings data records
            enhMetadataAPI:fieldTransfer: field transfer functionality
  schemas:
    MARCXML:
      description: see https://www.loc.gov/standards/marcxml/schema/MARC21slim.xsd
      type: object
      xml:
        name: record
      externalDocs:
        description: Learn about the Marc Bibliographic Standard
        url: https://www.loc.gov/standards/marcxml/
    MoveHoldings:
      description: Move holdings for an institution
      type: object
      properties:
        sourceOclcNumber:
          $ref: '#/components/schemas/SourceOclcNumber'
        targetOclcNumber:
          $ref: '#/components/schemas/TargetOclcNumber'
    SourceOclcNumber:
      description: The holding library symbol to move from
      type: string
    TargetOclcNumber:
      description: The holding library symbol to move to
      type: string
    OclcNumber:
      description: the oclc number of a given bibliographic record
      type: integer
      format: int64
    schemas-OclcNumber:
      description: the oclc number of a given bibliographic record
      type: integer
      format: int64
      example: 61253844
    ProblemType:
      description: A URI reference [RFC3986] that identifies the problem type.
      type: string
      format: uri
      enum:
        - https://developer.api.oclc.org/errors/NOT_ACCEPTABLE
        - https://developer.api.oclc.org/errors/NOT_ALLOWED
        - https://developer.api.oclc.org/errors/INTERAL_SERVER_ERROR
        - https://developer.api.oclc.org/errors/BAD_REQUEST
        - https://developer.api.oclc.org/errors/NOT_FOUND
        - https://developer.api.oclc.org/errors/NOT_ELIGIBLE
        - https://developer.api.oclc.org/errors/MISSING_QUERY_PARAMETER
        - https://developer.api.oclc.org/errors/INVALID_QUERY_PARAMETERS
        - https://developer.api.oclc.org/errors/INVALID_QUERY_PARAMETER_VALUE
        - https://developer.api.oclc.org/errors/INVALID_QUERY_PARAMETER_NAME
        - https://developer.api.oclc.org/errors/SYNTAX_ERROR
        - https://developer.api.oclc.org/errors/INVALID_DOCUMENT
        - https://developer.api.oclc.org/errors/MISSING_ELEMENT
        - https://developer.api.oclc.org/errors/INVALID_ELEMENT_VALUE
    Problem:
      type: object
      description: RFC 7807 description of an error.
      properties:
        type:
          $ref: '#/components/schemas/ProblemType'
        title:
          description: A short, human-readable summary of the problem type.
          type: string
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          type: string
          format: uri
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.,
          type: string
        invalidParams:
          description: An array of validation errors.
          type: array
          items:
            description: The validation error descriptor.
            type: object
            properties:
              path:
                type: string
              name:
                type: string
              reason:
                type: string
    SimpleTitle:
      description: Linked [v880sa,b] if present or [v245sa,b]
      type: string
    CreatorString:
      description: List of creators as single string
      type: string
    Date:
      description: machine readable date 008
      type: string
    ItemLanguage:
      description: Language of the item [v041sa,j]
      type: string
    GeneralFormat:
      description: General Format Type [Admin/OCLCDef/StdRT]
      type: string
      enum:
        - Archv
        - ArtChapter
        - AudioBook
        - Book
        - CompFile
        - Encyc
        - Game
        - Image
        - IntMM
        - Jrnl
        - Kit
        - Map
        - MsScr
        - Music
        - News
        - Object
        - Snd
        - Toy
        - Video
        - Vis
        - Web
    SpecificFormat:
      description: Specific Format Type [Admin/OCLCDef/StdRT2]
      type: string
      enum:
        - 2D
        - Artcl
        - Bluray
        - Braille
        - Cassette
        - CD
        - Chptr
        - Continuing
        - Digital
        - DVD
        - Encyc
        - Film
        - LargePrint
        - LP
        - Mic
        - mss
        - PrintBook
        - rec
        - Thsis
        - VHS
    EditionStatement:
      description: Edition Statement [v250sa]
      type: string
    Isbns:
      description: International Standard Book Number [v020sa]
      type: array
      items:
        type: string
    Issn:
      description: International Standard Serial Number [v022sal v700,v710,v711,v773,v776,v777,v780,v785 - sx]
      type: string
    Issns:
      description: International Standard Serial Numbers
      type: array
      items:
        $ref: '#/components/schemas/Issn'
    MergedOclcNumbers:
      description: Merged OCLC numbers [v019sa]
      type: array
      items:
        type: string
    CatalogingLanguage:
      description: Language record was cataloged in [v040sb]
      type: string
    CatalogingInfo:
      type: object
      properties:
        catalogingAgency:
          description: Cataloging Agency [v040/sa]
          type: string
        transcribingAgency:
          description: Transcribing Agency [v040/sc]
          type: string
        catalogingLanguage:
          $ref: '#/components/schemas/CatalogingLanguage'
        levelOfCataloging:
          description: Level of cataloging [LDR position 5]
          type: string
    RegistryId:
      description: The identifier in the WorldCat Registry for the institution
      type: integer
    State:
      description: Name of the State/Province, per ISO 3166-2.
      type: string
    PostalCode:
      description: Postal Code
      type: string
    Country:
      description: Two-character Country Code, per ISO 3166.
      type: string
    Latitude:
      description: Latitude
      type: number
      format: double
      example: 37.502508
    Longitude:
      description: Longitude
      type: number
      format: double
      example: -122.22702
    Address:
      type: object
      properties:
        street1:
          description: Name of street
          type: string
        street2:
          description: Name of street 2
          type: string
        city:
          description: Name of city
          type: string
        state:
          $ref: '#/components/schemas/State'
        postalCode:
          $ref: '#/components/schemas/PostalCode'
        country:
          $ref: '#/components/schemas/Country'
        lat:
          $ref: '#/components/schemas/Latitude'
        lon:
          $ref: '#/components/schemas/Longitude'
    InstitutionType:
      description: The type of institution
      enum:
        - ACADEMIC
        - PUBLIC
        - REGIONAL_OR_NATIONAL
        - OTHER
        - CORPORATE_SPECIAL_LIBRARY
        - HEALTH
        - MUSEUM_OR_ARCHIVES
        - LAW
        - MUSIC
        - LIBRARY_NETWORK_GROUP
      type: string
    HoldingBrief:
      type: object
      properties:
        country:
          description: Country of holding institution [Holdings/Library/Country]
          type: string
        state:
          description: State of holding institution [Holdings/Library/State]
          type: string
        oclcSymbol:
          description: Oclc Symbol of holding institution [Holdings/Library/InstSym]
          type: string
        registryId:
          $ref: '#/components/schemas/RegistryId'
        institutionName:
          description: Name of holding institution [Holdings/Library/InstName]
          type: string
        alsoCalled:
          description: Some name the library might also be called
          type: string
        address:
          $ref: '#/components/schemas/Address'
        institutionType:
          $ref: '#/components/schemas/InstitutionType'
        hasOPACLink:
          description: Whether or not the library has an OPAC deep links
          type: boolean
        distance:
          description: Distance from location if lat/log was specified
          type: string
        self:
          description: URI to find more info about the institution
          type: string
          format: uri
        illStatus:
          description: ILL status [Holdings/Library/ILLStatus]
          type: string
        illGroup:
          description: ILL group [Holdings/Library/ILLGroup]
          type: string
