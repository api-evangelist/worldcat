      description: Find basic configuration for a specified library
  parameters:
    oclcNumberListReq:
      name: oclcNumbers
      in: query
      description: One or more OCLC numbers. Separated by comma if providing multiple.
      required: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/OclcNumber'
      example: 41266045,1056157740
    oclcNumberAsId:
      name: oclcNumber
      in: path
      description: The OCLC number of the Bibliographic record
      required: true
      schema:
        $ref: '#/components/schemas/schemas-OclcNumber'
      example: 41266045
    accept:
      name: Accept
      in: header
      description: Content Type the client supports and is requesting (application/json currently supported)
      schema:
        type: string
        default: application/json
      required: false
    oclcNumber:
      name: oclcNumber
      in: query
      description: oclc number of the bibliographic item
      required: false
      schema:
        $ref: '#/components/schemas/OclcNumber'
      example: 41266045
    isbn:
      name: isbn
      in: query
      description: isbn of the bibliographic item (bn index)
      required: false
      schema:
        type: string
      example: 439136350
    issn:
      name: issn
      in: query
      description: issn of the bibliographic item (in index)
      required: false
      schema:
        type: string
      example: 0099-1333
    heldByGroup:
      name: heldByGroup
      in: query
      description: Restrict to holdings held by Group Symbol
      required: false
      schema:
        type: string
      example: ASRL
    heldInState:
      name: heldInState
      in: query
      description: Restrict to holdings held by Institutions in requested State/Province, per ISO 3166-2.
      required: false
      schema:
        $ref: '#/components/schemas/State'
      example: US-TX
    itemType:
      name: itemType
      in: query
      description: Limiter to restrict the response to the single specified OCLC top-level facet type (x0 index). (book, image)
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ItemType'
        minItems: 1
        maxItems: 5
      explode: false
      examples:
        single:
          value:
            - book
        multiple:
          value:
            - book
            - audiobook
    itemSubType:
      name: itemSubType
      in: query
      description: Limiter to restrict the response to the single specified OCLC sub facet type (x1 index). (dvd, digital)
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ItemSubType'
        minItems: 1
        maxItems: 5
      explode: false
      examples:
        single:
          value:
            - book-digital
        multiple:
          value:
            - book-digital
            - audiobook-digital
    holdingsAllEditions:
      name: holdingsAllEditions
      in: query
      description: Get holdings for all editions
      required: false
      schema:
        type: boolean
    holdingsAllVariantRecords:
      name: holdingsAllVariantRecords
      in: query
      description: Get holdings for specific edition across variant records
      required: false
      schema:
        type: boolean
    preferredLanguage:
      name: preferredLanguage
      in: query
      description: language user would prefer metadata description in
      required: false
      schema:
        description: three character MARC code for language to prefer records in
        type: string
        example: fre
    holdingsFilterFormat:
      name: holdingsFilterFormat
      in: query
      description: Get holdings for specific itemSubType
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ItemSubType'
        minItems: 1
        maxItems: 5
      explode: false
      examples:
        single:
          value:
            - book-digital
        multiple:
          value:
            - book-digital
            - audiobook-digital
    heldInCountry:
      name: heldInCountry
      in: query
      description: Restrict to holdings held by institutions in requested country
      required: false
      schema:
        $ref: '#/components/schemas/Country'
      example: US
    heldBy:
      name: heldBy
      in: query
      description: Institution Symbol
      deprecated: true
      required: false
      schema:
        type: string
      example: TXH
    heldBySymbol:
      name: heldBySymbol
      in: query
      description: Institution Symbol
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/OCLCSymbol'
        minItems: 1
        maxItems: 5
      explode: false
      examples:
        single:
          value:
            - TXH
        multiple:
          value:
            - TXH
            - YSM
    heldByInstitutionID:
      name: heldByInstitutionID
      in: query
      description: Institution registryId
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/RegistryId'
        minItems: 0
        maxItems: 5
      explode: false
      examples:
        single:
          value:
            - 128807
        multiple:
          value:
            - 128807
            - 91475
    heldByLibraryType:
      name: heldByLibraryType
      in: query
      description: Filter holdings to specified library types
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - PUBLIC
            - ALL
          default: ALL
        minItems: 1
        maxItems: 5
      explode: false
      examples:
        single:
          value:
            - PUBLIC
        multiple:
          value:
            - PUBLIC
            - ACADEMIC
    lat:
      name: lat
      in: query
      description: latitude
      required: false
      schema:
        $ref: '#/components/schemas/Latitude'
    lon:
      name: lon
      in: query
      description: longitude
      required: false
      schema:
        $ref: '#/components/schemas/Longitude'
    distance:
      name: distance
      in: query
      description: distance
      required: false
      schema:
        type: integer
        format: int32
      example: 10
    unit:
      name: unit
      in: query
      description: distance unit
      required: false
      schema:
        $ref: '#/components/schemas/Unit'
    query:
      name: q
      in: query
      description: query in the form of a keyword search or fielded search, for example  (au:gazihan OR au:womacka) AND kw:java See - https://help.oclc.org/Librarian_Toolbox/Searching_WorldCat_Indexes/Bibliographic_records/Bibliographic_record_indexes/Bibliographic_record_index_lists
      required: true
      schema:
        type: string
      example: 'ti: Simon''s Cat'
    deweyNumber:
      name: deweyNumber
      in: query
      description: Limiter to restrict the response to the specified dewey classification number(s). For multiple values repeat the URL parameter. (dd index)
      required: false
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 5
      explode: false
      examples:
        single:
          value:
            - 870
    datePublished:
      name: datePublished
      in: query
      description: Limiter to restrict the response to one or more dates or to a range (in index). (2000, 2000-2010, 1990,1991)
      required: false
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 5
      explode: false
      examples:
        single_date:
          value:
            - 2000
        multiple_dates:
          value:
            - 1990
            - 1991
        range:
          value:
            - 2000-2010
    inLanguage:
      name: inLanguage
      in: query
      description: Limiter to restrict the response to the single specified language (ln index). (eng, fre, ger)
      required: false
      schema:
        type: array
        items:
          type: string
        minItems: 1
        maxItems: 5
      explode: false
      examples:
        single:
          value:
            - eng
        multiple:
          value:
            - eng
            - fre
            - ger
    inCatalogLanguage:
      name: inCatalogLanguage
      in: query
      description: Limiter to restrict the response to the single specified cataloging language (ll index). (dut, eng)
      required: false
      schema:
        type: string
      example: eng
    materialType:
      name: materialType
      in: query
      description: Limiter to restrict the response to the specified material type (mt index). (URL, LPS)
      required: false
      schema:
        type: string
      example: URL
    catalogSource:
      name: catalogSource
      in: query
      description: Limiter to restrict the response to the single OCLC symbol as the cataloging source (cs index). (OSL)
      required: false
      schema:
        type: string
      example: OCL
    retentionCommitments:
      name: retentionCommitments
      in: query
      description: Limiter to restrict the response to bibliographic records with a retention commitment (l8 index).
      required: false
      schema:
        type: boolean
        default: false
    spProgram:
      name: spProgram
      in: query
      description: Limiter to restrict the response to bibliographic records associated with a particular shared print program (l8 index).
      required: false
      schema:
        type: string
      example: WEST
    genre:
      name: genre
      in: query
      description: Genre to limit results to (ge index)
      required: false
      schema:
        type: string
      example: fiction
    topic:
      name: topic
      in: query
      description: topic to limit results to (s0 index). Based on OCLC Conspectus Division
      required: false
      schema:
        type: string
      example: 34000000
    subtopic:
      name: subtopic
      in: query
      description: subtopic to limit results to (s1 index). Based on OCLC Conspectus Category
      required: false
      schema:
        type: string
      example: 34932000
    audience:
      name: audience
      in: query
      description: Audience to limit results to
      required: false
      schema:
        type: string
        enum:
          - juv
          - nonJuv
      example: juv
    content:
      name: content
      in: query
      description: Content to limit results to
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - fic
            - nonFic
            - bio
        minItems: 1
        maxItems: 5
      explode: false
      examples:
        single:
          value:
            - fic
        multiple:
          value:
            - fic
            - bio
    openAccess:
      name: openAccess
      in: query
      description: filter to just open access content
      required: false
      schema:
        type: boolean
    peerReviewed:
      name: peerReviewed
      in: query
      description: filter to just peer reviewed content
      required: false
      schema:
        type: boolean
    facets:
      name: facets
      in: query
      description: The requested list of facets requested in the response
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - subject
            - creator
            - datePublished
            - genre
            - itemType
            - itemSubTypeBrief
            - itemSubType
            - language
            - topic
            - subtopic
            - content
            - audience
            - databases
        minItems: 1
        maxItems: 13
      explode: false
      examples:
        single:
          value:
            - creator
        multiple:
          value:
            - creator
            - itemType
    groupRelatedEditions:
      name: groupRelatedEditions
      in: query
      description: Whether or not to use FRBR grouping. Default is 'false'
      required: false
      schema:
        type: boolean
        default: false
    groupVariantRecords:
      name: groupVariantRecords
      in: query
      description: Whether or not to group variant records. Default is 'false'
      required: false
      schema:
        type: boolean
        default: false
    showHoldingIndicators:
      name: showHoldingsIndicators
      in: query
      description: whether or not to show holdings indicators in response
      required: false
      schema:
        type: boolean
        default: false
    orderBy:
      name: orderBy
      in: query
      description: result sort key
      required: false
      schema:
        type: string
        default: bestMatch
        enum:
          - library
          - recency
          - bestMatch
          - creator
          - publicationDateAsc
          - publicationDateDesc
          - mostWidelyHeld
          - title
    offset:
      name: offset
      in: query
      description: start position of the bib records to return (0 based), default 0
      required: false
      schema:
        type: integer
        format: int32
        default: 0
      example: 10
    limit:
      name: limit
      in: query
      description: maximum number of records to return, maximum 50, default 10
      required: false
      schema:
        type: integer
        format: int32
        default: 10
      example: 50
    parameters-oclcNumberAsId:
      name: oclcNumber
      in: path
      description: record OCLC number
      required: true
      schema:
        $ref: '#/components/schemas/OclcNumber'
      example: 41266045
    editionOrderBy:
      name: orderBy
      in: query
      description: how to sort the edition resultsresults
      schema:
        type: string
        enum:
          - library
          - recency
          - bestMatch
          - creator
          - publicationDateAsc
          - publicationDateDesc
          - language
          - mostWidelyHeld
          - title
        default: publicationDateDesc
      example: language
    oclcNumberReq:
      name: oclcNumber
      in: query
      description: oclc number of the bibliographic item
      required: true
      schema:
        $ref: '#/components/schemas/OclcNumber'
      example: 41266045
    barcode:
      name: barcode
      in: query
      description: barcode
      required: false
      schema:
        type: string
      example: K123456789
    retainedHoldingsOrderBy:
      name: orderBy
      in: query
      description: result sort key
      required: false
      schema:
        type: string
        default: oclcSymbol
        enum:
          - commitmentExpirationDate
          - location
          - oclcSymbol
    lbd-control-number:
      name: controlNumber
      in: path
      description: LBD control number
      required: true
      schema:
        type: string
      example: 588894059
    lhr-control-number:
      name: controlNumber
      in: path
      description: LHR control number
      required: true
      schema:
        type: string
      example: 238374600
    lhrOrderBy:
      name: orderBy
      in: query
      description: result sort key
      required: false
      schema:
        type: string
        default: oclcSymbol
        enum:
          - commitmentExpirationDate
          - location
          - oclcSymbol
    callNumber:
      name: callNumber
      in: query
      description: The item call number
      required: false
      schema:
        $ref: '#/components/schemas/DisplayCallNumber'
    holdingLocation:
      name: holdingLocation
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/SublocationCollection'
      example: MAIN
    shelvingLocation:
      name: shelvingLocation
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/ShelvingLocation'
      example: MAIN-Stacks
    position:
      name: browsePosition
      in: query
      description: The position within the browse list where the matching record should be
      required: false
      schema:
        type: integer
        format: int32
        default: 0
      example: 10
    includeShelvingLocations:
      name: includeShelvingLocations
      description: whether or not to include shelving location information in the response
      schema:
        type: boolean
        default: false
      in: query
      required: false
    branchLocationLimit:
      name: branchLocationLimit
      description: branch identifier (registryId) to limit results to
      schema:
        type: integer
      in: query
      required: false
    registryIds:
      name: registryIds
      description: Comma seperated list of registryIds to retrieve
      schema:
        type: array
        items:
          $ref: '#/components/schemas/RegistryId'
      style: form
      explode: false
      examples:
        single:
          value:
            - 128807
        multiple:
          value:
            - 128807
            - 91475
      in: query
      required: false
    oclcSymbols:
      name: oclcSymbols
